name: 🚦 PR Checks

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: 🎨 Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🛠️ Setup project
        uses: ./.github/actions/setup-pnpm

      - name: 🚨 Run lint
        run: pnpm run lint:ci

  typecheck:
    name: 🔎 Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🛠️ Setup project
        uses: ./.github/actions/setup-pnpm

      - name: 🔎 Run typecheck
        run: pnpm run typecheck

  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🛠️ Setup project
        uses: ./.github/actions/setup-pnpm

      - name: 🏗️ Run build
        run: pnpm run build
        env:
          SKIP_REMOTE_DATA: '1'

  report:
    name: 📋 Report
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint
      - typecheck
      - build
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: 📝 Write job summary
        shell: bash
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          node <<'EOF'
          const fs = require('node:fs')
          const summaryPath = process.env.GITHUB_STEP_SUMMARY

          const icon = result => result === 'success' ? '✅' : result === 'failure' ? '❌' : '⏭️'
          const lint = process.env.LINT_RESULT || 'skipped'
          const typecheck = process.env.TYPECHECK_RESULT || 'skipped'
          const build = process.env.BUILD_RESULT || 'skipped'

          const lines = [
            '## 🚦 PR Checks',
            '',
            `- 🎨 Lint: ${icon(lint)} **${lint}**`,
            `- 🔎 Typecheck: ${icon(typecheck)} **${typecheck}**`,
            `- 🏗️ Build: ${icon(build)} **${build}**`,
            '',
          ]

          fs.appendFileSync(summaryPath, `${lines.join('\n')}\n`)
          EOF

      - name: 💬 Upsert PR comment
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        with:
          script: |
            const marker = '<!-- dtr-web-pr-checks -->'
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`

            const icon = result => result === 'success' ? '✅' : result === 'failure' ? '❌' : '⏭️'
            const lint = process.env.LINT_RESULT || 'skipped'
            const typecheck = process.env.TYPECHECK_RESULT || 'skipped'
            const build = process.env.BUILD_RESULT || 'skipped'

            const body = [
              marker,
              '### 🚦 PR Checks',
              '',
              `- 🎨 Lint: ${icon(lint)} **${lint}**`,
              `- 🔎 Typecheck: ${icon(typecheck)} **${typecheck}**`,
              `- 🏗️ Build: ${icon(build)} **${build}**`,
              '',
              `🔗 Run: ${runUrl}`,
            ].join('\n')

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            })

            const existing = comments.find(comment => (comment.body || '').includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              })
            }

      - name: 🚦 Fail workflow if any required check failed
        shell: bash
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          if [ "$LINT_RESULT" != "success" ] \
            || [ "$TYPECHECK_RESULT" != "success" ] \
            || [ "$BUILD_RESULT" != "success" ]; then
            echo "One or more required PR checks failed."
            exit 1
          fi

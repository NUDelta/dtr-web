name: r2-gc
on:
  schedule:
    - cron: '0 8 * * *' # Everyday 08:00 AM UTC
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger R2 GC
        run: |
          curl --fail-with-body -sS -X POST \
            -H "x-cron-token: $CICD_SECRET" \
            -H "content-type: application/json" \
            -d '{"prefix":"images/","graceDays":15,"minIntervalHours":24,"maxDeletePerRun":250}' \
            "https://dtr.northwestern.edu/api/r2-gc"
        env:
          CICD_SECRET: ${{ secrets.CICD_SECRET }}

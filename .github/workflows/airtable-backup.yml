name: airtable-backup
on:
  schedule:
    # Tuesdays 09:23 UTC. Keep backups away from weekly R2 GC to spread quota use.
    - cron: '23 9 * * 2'
  workflow_dispatch:
    inputs:
      force:
        description: Force a new backup even if one already ran today
        required: false
        default: false
        type: boolean

concurrency:
  group: airtable-backup
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Back up Airtable to R2
        run: |
          set -euo pipefail

          echo "::group::Back up Airtable to R2"
          response_file="$(mktemp)"
          request_id="backup-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          payload="{\"force\":${AIRTABLE_BACKUP_FORCE},\"requestId\":\"${request_id}\"}"
          started_at="$(date -u +%s)"

          echo "started_at_utc=$(date -u --iso-8601=seconds)"
          echo "request_id=${request_id}"
          echo "payload=${payload}"

          curl_exit=0
          http_status="$(
            curl --fail-with-body -sS \
              --connect-timeout 30 \
              --max-time 900 \
              -o "${response_file}" \
              -w "%{http_code}" \
              -X POST \
              -H "x-cron-token: $CICD_SECRET" \
              -H "content-type: application/json" \
              -d "${payload}" \
              "https://dtr.northwestern.edu/api/airtable-backup"
          )" || curl_exit=$?

          finished_at="$(date -u +%s)"
          duration_seconds=$((finished_at - started_at))
          echo "finished_at_utc=$(date -u --iso-8601=seconds)"
          echo "duration_seconds=${duration_seconds}"
          echo "http_status=${http_status}"
          echo "curl_exit=${curl_exit}"
          echo "response_body:"
          cat "${response_file}"
          echo
          echo "::endgroup::"

          {
            echo "## Airtable Backup"
            echo
            echo "- Request ID: ${request_id}"
            echo "- Status: ${http_status}"
            echo "- Duration: ${duration_seconds}s"
            echo "- Curl exit: ${curl_exit}"
            echo
            echo '```json'
            cat "${response_file}"
            echo
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          rm -f "${response_file}"

          if [ "${curl_exit}" -ne 0 ]; then
            exit "${curl_exit}"
          fi
        env:
          CICD_SECRET: ${{ secrets.CICD_SECRET }}
          AIRTABLE_BACKUP_FORCE: ${{ inputs.force || false }}

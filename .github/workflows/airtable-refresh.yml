name: airtable-refresh
on:
  schedule:
    # Fixed UTC-6 Chicago reference schedule without daylight-saving adjustment:
    # 01:00 and 13:00 standard time -> 07:00 and 19:00 UTC.
    - cron: '0 7,19 * * *'
  workflow_dispatch: {}

concurrency:
  group: airtable-refresh
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Refresh Airtable cache
        run: |
          set -euo pipefail

          tables=(
            "People"
            "Projects"
            "SIGs"
            "Project Images"
            "Project Publications"
          )
          failed_tables=()
          guard_owner="airtable-refresh-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          guard_released=0

          release_guard() {
            if [ "${guard_released}" -eq 1 ]; then
              return
            fi

            guard_released=1
            release_response_file="$(mktemp)"
            release_payload="{\"releaseGuardOnly\":true,\"guardOwner\":\"${guard_owner}\"}"
            release_started_at="$(date -u +%s)"

            echo "::group::Release Airtable refresh guard"
            echo "started_at_utc=$(date -u --iso-8601=seconds)"
            echo "guard_owner=${guard_owner}"
            echo "payload=${release_payload}"

            set +e
            release_http_status="$(
              curl -sS \
                --connect-timeout 30 \
                --max-time 90 \
                -o "${release_response_file}" \
                -w "%{http_code}" \
                -X POST \
                -H "x-cron-token: $CICD_SECRET" \
                -H "content-type: application/json" \
                -d "${release_payload}" \
                "https://dtr.northwestern.edu/api/airtable-refresh"
            )"
            release_curl_exit=$?
            set -e

            release_finished_at="$(date -u +%s)"
            echo "finished_at_utc=$(date -u --iso-8601=seconds)"
            echo "duration_seconds=$((release_finished_at - release_started_at))"
            echo "http_status=${release_http_status}"
            echo "curl_exit=${release_curl_exit}"
            echo "response_body:"
            cat "${release_response_file}"
            echo
            rm -f "${release_response_file}"
            echo "::endgroup::"
          }

          trap release_guard EXIT

          for table in "${tables[@]}"; do
            echo "::group::Refresh Airtable table: ${table}"
            response_file="$(mktemp)"
            payload="{\"minIntervalHours\":11,\"guardOwner\":\"${guard_owner}\",\"releaseGuard\":false,\"tables\":[\"${table}\"]}"
            started_at="$(date -u +%s)"

            echo "started_at_utc=$(date -u --iso-8601=seconds)"
            echo "guard_owner=${guard_owner}"
            echo "payload=${payload}"

            curl_exit=0
            http_status="$(
              curl --fail-with-body -sS \
                --connect-timeout 30 \
                --max-time 540 \
                -o "${response_file}" \
                -w "%{http_code}" \
                -X POST \
                -H "x-cron-token: $CICD_SECRET" \
                -H "content-type: application/json" \
                -d "${payload}" \
                "https://dtr.northwestern.edu/api/airtable-refresh"
            )" || curl_exit=$?

            finished_at="$(date -u +%s)"
            echo "finished_at_utc=$(date -u --iso-8601=seconds)"
            echo "duration_seconds=$((finished_at - started_at))"
            echo "http_status=${http_status}"
            echo "curl_exit=${curl_exit}"
            echo "response_body:"
            cat "${response_file}"
            echo
            rm -f "${response_file}"
            echo "::endgroup::"

            if [ "${curl_exit}" -ne 0 ]; then
              failed_tables+=("${table} (curl_exit=${curl_exit}, http_status=${http_status})")
            fi
          done

          if [ "${#failed_tables[@]}" -gt 0 ]; then
            echo "Airtable refresh failed for ${#failed_tables[@]} table(s):"
            printf ' - %s\n' "${failed_tables[@]}"
            exit 1
          fi
        env:
          CICD_SECRET: ${{ secrets.CICD_SECRET }}
